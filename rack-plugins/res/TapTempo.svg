<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="30.48mm" height="128.5mm" viewBox="0 0 90 379.42">
  <rect width="90" height="379.42" fill="#1b1b22"/>
  <rect x="2" y="2" width="86" height="375.42" fill="none" stroke="#3a3a48" stroke-width="1"/>

  <g font-family="Helvetica, Arial, sans-serif" fill="#e6e6ee" text-anchor="middle">
    <!-- Title -->
    <text x="45" y="26" font-size="11" font-weight="bold" letter-spacing="1">TAP TEMPO</text>
    <text x="45" y="38" font-size="6" fill="#9a9aaa" letter-spacing="1">MASTER CLOCK</text>

    <!-- Pot labels (knob centers at px y = mm*2.9528) -->
    <text x="45" y="112" font-size="9">MULT</text>
    <text x="45" y="162" font-size="9">DIV</text>
    <text x="45" y="213" font-size="9">DIV</text>

    <!-- Tap button -->
    <text x="45" y="263" font-size="8">TAP</text>

    <!-- Jack section -->
    <line x1="10" y1="271" x2="80" y2="271" stroke="#3a3a48" stroke-width="0.8"/>
    <text x="45" y="272" font-size="6" fill="#9a9aaa">CLOCK IN</text>

    <!-- Jack labels (CLOCK in, F1/F2/F3/F4 out) -->
    <text x="30" y="304" font-size="7.5">F1 4x</text>
    <text x="60" y="304" font-size="7.5">F2 ×</text>
    <text x="30" y="339" font-size="7.5">F3 ÷</text>
    <text x="60" y="339" font-size="7.5">F4 ÷</text>
    <text x="60" y="312" font-size="5.5" fill="#9a9aaa">MUL</text>
  </g>
</svg>
