<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="40.64mm" height="128.5mm" viewBox="0 0 120 379.42">
  <rect width="120" height="379.42" fill="#221b22"/>
  <rect x="2" y="2" width="116" height="375.42" fill="none" stroke="#48384a" stroke-width="1"/>

  <g font-family="Helvetica, Arial, sans-serif" fill="#f0e6ee" text-anchor="middle">
    <!-- Title -->
    <text x="60" y="26" font-size="11" font-weight="bold" letter-spacing="1">FM DRUM</text>
    <text x="60" y="38" font-size="6" fill="#a99aaa" letter-spacing="1">2-OP FM PERC</text>

    <!-- Knob labels (left column x=39, right column x=81) -->
    <text x="39" y="148" font-size="8">PITCH</text>
    <text x="81" y="148" font-size="8">RATIO</text>
    <text x="39" y="207" font-size="8">INDEX</text>
    <text x="81" y="207" font-size="8">DECAY</text>
    <text x="39" y="266" font-size="8">R.ENV</text>

    <!-- Push button -->
    <text x="81" y="266" font-size="8">TRIG</text>

    <!-- Jack section -->
    <line x1="10" y1="278" x2="110" y2="278" stroke="#48384a" stroke-width="0.8"/>

    <!-- Jack labels (inputs row y=100mm/295, out row y=114mm/336) -->
    <text x="29.5" y="288" font-size="6.5">TRIG</text>
    <text x="60" y="288" font-size="6.5">ACC</text>
    <text x="90.5" y="288" font-size="6.5">IDX</text>
    <text x="90.5" y="329" font-size="7">OUT</text>
  </g>
</svg>
