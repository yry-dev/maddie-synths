<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="30.48mm" height="128.5mm" viewBox="0 0 90 379.42">
  <rect width="90" height="379.42" fill="#1b1b22"/>
  <rect x="2" y="2" width="86" height="375.42" fill="none" stroke="#3a3a48" stroke-width="1"/>

  <g font-family="Helvetica, Arial, sans-serif" fill="#e6e6ee" text-anchor="middle">
    <!-- Title -->
    <text x="45" y="26" font-size="11" font-weight="bold" letter-spacing="1">HIHAT</text>
    <text x="45" y="38" font-size="6" fill="#9a9aaa" letter-spacing="1">NOISE</text>

    <!-- Pot labels (knob centers at px y = mm*2.9528) -->
    <text x="45" y="112" font-size="9">DECAY</text>
    <text x="45" y="162" font-size="9">CURVE</text>
    <text x="45" y="213" font-size="9">FREQ</text>

    <!-- Noise switch + trigger button -->
    <text x="24" y="252" font-size="6" fill="#9a9aaa">NOISE</text>
    <text x="60" y="252" font-size="7">TRIG</text>

    <!-- Jack section -->
    <line x1="10" y1="271" x2="80" y2="271" stroke="#3a3a48" stroke-width="0.8"/>
    <text x="22" y="280" font-size="6" fill="#9a9aaa">IN</text>
    <text x="63" y="280" font-size="6" fill="#9a9aaa">OUT</text>

    <!-- Jack labels (IN1 trig, CV freq, IN2 accent, OUT audio) -->
    <text x="30" y="313" font-size="7.5">TRIG</text>
    <text x="60" y="313" font-size="7.5">FREQ</text>
    <text x="30" y="357" font-size="7.5">ACC</text>
    <text x="60" y="357" font-size="7.5">OUT</text>
    <text x="60" y="321" font-size="5.5" fill="#9a9aaa">CV</text>
  </g>
</svg>
