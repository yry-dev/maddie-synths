name: Build Rack plugin

# Builds the VCV Rack plugin (rack-plugins/) for macOS (x64 + arm64), Linux, and
# Windows, then publishes a GitHub release when triggered by a release tag.
#
# Tag conventions:
#   vX.Y.Z-msrack        -> versioned release      (e.g. v0.0.1-msrack)
#   vX.Y.Z-next-msrack   -> pre-release / nightly  (e.g. v0.0.1-next-msrack)
#
# `workflow_dispatch` builds all platforms without publishing, for testing.
on:
  push:
    tags:
      - "v*-msrack"
      - "v*-next-msrack"
  workflow_dispatch: {}

permissions:
  contents: write # needed by the publish job to create releases

env:
  # Rack SDK to build against. Bump together with rack-plugins/README.md.
  RACK_SDK_VERSION: "2.6.4"

concurrency:
  group: rack-plugin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Derive the plugin version and pre-release flag from the tag (or the working
  # version for manual runs) so every build job stamps an identical version.
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive.outputs.version }}
      prerelease: ${{ steps.derive.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - id: derive
        run: |
          set -euo pipefail
          short="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
            base="${tag#v}"
            if [[ "${tag}" == *-next-msrack ]]; then
              version="${base%-next-msrack}-next.${short}"
              prerelease="true"
            else
              version="${base%-msrack}"
              prerelease="false"
            fi
          else
            # Manual run: stamp the working version with the commit so artifacts
            # are identifiable. Never published (publish runs on tags only).
            base="$(jq -r .version plugin.json)"
            version="${base}-dev.${short}"
            prerelease="true"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${version} prerelease=${prerelease}"

  build:
    needs: meta
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, platform: lin-x64, shell: bash }
          - { os: macos-13, platform: mac-x64, shell: bash }
          - { os: macos-14, platform: mac-arm64, shell: bash }
          - { os: windows-latest, platform: win-x64, shell: "msys2 {0}" }
    steps:
      - uses: actions/checkout@v4

      # --- toolchain / build deps -----------------------------------------
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential libgl-dev libglu1-mesa-dev zstd jq unzip curl

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install zstd jq || true

      - name: Install build tools (Windows / MSYS2)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            make
            unzip
            curl
            tar
            zstd
            jq
            mingw-w64-x86_64-gcc

      # --- manifest version + Rack SDK ------------------------------------
      - name: Stamp plugin version
        shell: ${{ matrix.shell }}
        run: |
          set -euo pipefail
          v="${{ needs.meta.outputs.version }}"
          jq --arg v "$v" '.version = $v' plugin.json > plugin.json.tmp
          mv plugin.json.tmp plugin.json
          echo "plugin.json version -> $(jq -r .version plugin.json)"

      - name: Download Rack SDK
        shell: ${{ matrix.shell }}
        run: |
          set -euo pipefail
          url="https://vcvrack.com/downloads/Rack-SDK-${RACK_SDK_VERSION}-${{ matrix.platform }}.zip"
          echo "Fetching $url"
          curl -fsSL -o rack-sdk.zip "$url"
          unzip -q rack-sdk.zip
          test -d Rack-SDK

      # --- build + package -------------------------------------------------
      - name: Build plugin
        shell: ${{ matrix.shell }}
        run: make rack-dist RACK_DIR="$PWD/Rack-SDK"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: maddie-synths-${{ matrix.platform }}
          path: rack-plugins/dist/*.vcvplugin
          if-no-files-found: error

  publish:
    needs: [meta, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: maddie-synths-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Maddie Synths ${{ github.ref_name }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/*.vcvplugin
