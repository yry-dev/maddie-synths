<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="40.64mm" height="128.5mm" viewBox="0 0 120 379.42">
  <rect width="120" height="379.42" fill="#221b22"/>
  <rect x="2" y="2" width="116" height="375.42" fill="none" stroke="#48384a" stroke-width="1"/>

  <g font-family="Helvetica, Arial, sans-serif" fill="#f0e6ee" text-anchor="middle">
    <!-- Title -->
